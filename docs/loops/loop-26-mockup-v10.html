<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan's Todo — Loop-26 Mockup v10</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;background:#eceae4;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:12px}
.shell{display:flex;width:1340px;height:840px;font-size:13px;color:#2C2C2A;background:#f7f6f3;border-radius:14px;overflow:hidden;border:0.5px solid #d3d1c7;box-shadow:0 4px 32px rgba(0,0,0,.10)}

/* Sidebar */
.sb{width:200px;background:#fff;border-right:0.5px solid #e8e6df;display:flex;flex-direction:column;flex-shrink:0;user-select:none}
.sb-top{padding:12px 12px 0;display:flex;flex-direction:column;gap:6px}
.sb-logo{display:flex;align-items:center;gap:7px;font-weight:600;font-size:14px}
.sb-logo-c{width:26px;height:26px;border-radius:7px;background:#1D9E75;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.ts{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;background:#f5f4f0;cursor:pointer;font-size:12px;color:#6b6a66;border:0.5px solid #e8e6df}
.ts:hover{background:#eeedea}
.ts-i{width:18px;height:18px;border-radius:4px;background:#378ADD;display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px;font-weight:700;flex-shrink:0}
.ts-n{font-weight:500;flex:1}.ts-a{font-size:9px;color:#b4b2a9}
.sb-scroll{flex:1;overflow-y:auto;padding:4px 0}
.sb-sec{padding:10px 12px 3px;font-size:10px;color:#a09f99;font-weight:600;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.sb-sec-add{font-size:13px;color:#b4b2a9;cursor:pointer;font-weight:400;line-height:1}.sb-sec-add:hover{color:#6b6a66}
.si{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;border-radius:6px;margin:1px 5px;font-size:13px;color:#6b6a66;transition:all .1s}
.si:hover{background:#f5f4f0;color:#2C2C2A}.si.on{background:#f0efe8;color:#2C2C2A;font-weight:500}
.sd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.si-icon{width:15px;text-align:center;font-size:12px;flex-shrink:0;opacity:.5}
.sb-div{height:0.5px;background:#e8e6df;margin:5px 12px}
.sb-footer{border-top:0.5px solid #e8e6df;padding:6px 8px;display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.sf{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:5px;cursor:pointer;font-size:11px;color:#a09f99}.sf:hover{background:#f5f4f0;color:#6b6a66}
.sp{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:5px;cursor:pointer}.sp:hover{background:#f5f4f0}
.sp-av{width:22px;height:22px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:600;flex-shrink:0}
.sp-n{font-size:11px;font-weight:500;color:#2C2C2A}.sp-e{font-size:9px;color:#b4b2a9}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.ph{display:flex;align-items:center;gap:10px;height:46px;padding:0 18px;background:#fff;border-bottom:0.5px solid #e8e6df;flex-shrink:0}
.ph-d{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ph-n{font-size:15px;font-weight:600}.ph-m{font-size:11px;color:#a09f99}
.ph-tabs{margin-left:auto;display:flex;gap:2px}
.pt{font-size:12px;padding:4px 13px;border-radius:6px;cursor:pointer;color:#a09f99;background:none;border:none;font-family:inherit;font-weight:500}
.pt:hover{background:#f5f4f0}.pt.on{background:#f0efe8;color:#2C2C2A;font-weight:600}
.bg{font-size:10px;background:#e8e6df;border-radius:999px;padding:1px 6px;margin-left:3px;color:#a09f99;font-weight:500}
.bw{background:#FAEEDA;color:#854F0B}
.mmb{display:flex;align-items:center;gap:1px;padding:5px 18px;background:#fafaf8;border-bottom:0.5px solid #e8e6df;flex-shrink:0}
.mbt{font-size:11px;padding:4px 11px;border-radius:5px;cursor:pointer;color:#a09f99;background:none;border:none;font-family:inherit;font-weight:500}
.mbt:hover{background:#f0efe8;color:#6b6a66}.mbt.on{background:#e8e6df;color:#2C2C2A;font-weight:600}
.cnt{flex:1;overflow:auto;background:#fff}

/* ── Reference 2-Panel (milestone>deliverable | tasks) ── */
.rv{display:flex;flex-direction:column;height:100%}
.rv-body{flex:1;overflow-y:auto}
.rv-footer{border-top:0.5px solid #e8e6df;flex-shrink:0;background:#fafaf8}

/* Row = one milestone with its deliverables + tasks */
.mr{display:flex;border-bottom:0.5px solid #eeedea;min-height:60px}
.mr-left{width:50%;flex-shrink:0;padding:14px 20px 12px;border-right:0.5px solid #eeedea}
.mr-right{flex:1;padding:10px 16px;display:flex;flex-direction:column;justify-content:flex-start}

/* Milestone */
.ms-head{display:flex;align-items:flex-start;gap:8px}
.ms-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ms-info{flex:1;min-width:0}
.ms-t{font-size:14px;font-weight:600}
.ms-desc{font-size:11px;color:#a09f99;margin-top:2px}
.ms-dates{display:flex;align-items:center;gap:5px;margin-top:5px;font-size:11px;color:#6b6a66}
.ms-dv{padding:2px 8px;border-radius:4px;background:#f5f4f0;cursor:pointer;transition:all .1s;border:0.5px solid transparent}
.ms-dv:hover{border-color:#d3d1c7;background:#fff}
.ms-dv.urg{background:#FAEEDA;color:#854F0B;font-weight:500}
.ms-sep{color:#c2c0b6;font-size:10px}
.ms-dd{font-size:10px;font-weight:500;color:#b4b2a9;margin-left:2px}
.ms-dd.urg{color:#BA7517}

/* Deliverables (single-line, nested under milestone) */
.dv-area{margin-top:10px;padding-left:17px}
.dv-line{display:flex;align-items:center;gap:6px;padding:3px 0;position:relative}
.dv-line:hover .del-btn{opacity:1}
.dv-num{font-size:10px;color:#b4b2a9;font-weight:600;min-width:14px}
.dv-name{font-size:12px;color:#2C2C2A;flex:1}
.dv-tag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500;flex-shrink:0}
.dv-add{font-size:11px;color:#b4b2a9;cursor:pointer;padding:3px 0;display:flex;align-items:center;gap:3px}
.dv-add:hover{color:#6b6a66}

/* Delete button */
.del-btn{opacity:0;transition:opacity .12s;width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;border:none;font-size:12px;color:#c2c0b6;flex-shrink:0}
.del-btn:hover{background:#fce8e8;color:#c53030}
.mr:hover > .mr-left .ms-del{opacity:1}
.ms-head:hover .del-btn{opacity:1}

/* Task list (right panel) */
.tk-section{margin-bottom:4px}
.tk-section-label{font-size:9px;color:#b4b2a9;font-weight:500;letter-spacing:.02em;margin-bottom:2px;padding-left:2px}
.tk-row{display:flex;align-items:center;gap:6px;padding:3px 4px;border-radius:4px;transition:background .1s;position:relative}
.tk-row:hover{background:#f5f4f0}
.tk-row:hover .del-btn{opacity:1}
.tk-cb{width:14px;height:14px;border:1.5px solid #c2c0b6;border-radius:3px;flex-shrink:0;cursor:pointer;background:none;position:relative}
.tk-cb.dn{background:#b4b2a9;border-color:#b4b2a9}
.tk-cb.dn::after{content:'✓';position:absolute;top:-2px;left:1px;font-size:10px;color:#fff}
.tk-text{flex:1;font-size:12px;outline:none;border:none;background:transparent;font-family:inherit;color:#2C2C2A}
.tk-text.dn{text-decoration:line-through;color:#b4b2a9}
.tk-text:empty::before{content:'Task 이름 입력...';color:#c2c0b6}
.tk-who{font-size:10px;padding:1px 6px;border-radius:999px;font-weight:500;flex-shrink:0}
.tk-dvtag{font-size:8px;padding:1px 5px;border-radius:2px;background:#f0efe8;color:#a09f99;flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tk-add{display:flex;align-items:center;gap:3px;padding:3px 4px;font-size:11px;color:#b4b2a9;cursor:pointer;margin-top:1px}
.tk-add:hover{color:#6b6a66}
.tk-empty{font-size:11px;color:#BA7517;padding:3px 4px}

/* Right panel header */
.rp-hdr{font-size:10px;color:#a09f99;font-weight:600;letter-spacing:.02em;margin-bottom:6px}

/* ── Collapsible footer ── */
.ctog{display:flex;align-items:center;gap:6px;padding:8px 20px;cursor:pointer;font-size:11px;color:#a09f99;font-weight:500}
.ctog:hover{background:#f0efe8}
.ctog .arr{font-size:9px;transition:transform .2s;display:inline-block}
.ctog .arr.open{transform:rotate(90deg)}
.ctog .sc{font-size:9px;background:#eeedea;border-radius:999px;padding:0 5px;color:#b4b2a9}
.cbo{overflow:hidden;max-height:0;transition:max-height .25s ease}
.ci{padding:0 20px 10px 36px}
.li{display:flex;align-items:flex-start;gap:6px;padding:4px 0;cursor:pointer}
.li-ic{color:#378ADD;font-size:11px;margin-top:1px;flex-shrink:0}
.li-t{font-size:11px;color:#378ADD}.li-t:hover{text-decoration:underline}
.li-d{font-size:10px;color:#b4b2a9}
.poli{padding:4px 0}.poli-t{font-size:11px;line-height:1.4}
.poli-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-right:3px;font-weight:500}
.poli-d{font-size:10px;color:#a09f99;margin-top:1px}

/* ── Tasks Tab ── */
.tbar{display:flex;align-items:center;gap:10px;padding:8px 18px;background:#fafaf8;border-bottom:0.5px solid #e8e6df;font-size:11px;color:#a09f99}
.tbar-dot{width:6px;height:6px;border-radius:50%;background:#BA7517}
.tbar-label{font-weight:600;color:#2C2C2A;font-size:12px}
.tbar-dd{color:#BA7517;font-weight:600}
.tbar-gap{background:#FAEEDA;color:#854F0B;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500}
.tg{padding:14px 18px 4px}
.tg-h{font-size:12px;font-weight:600;color:#6b6a66;margin-bottom:6px}
.tg-c{font-size:11px;color:#b4b2a9;font-weight:400}
.trow{display:flex;align-items:center;gap:7px;padding:6px 0}
.tcb{width:15px;height:15px;border:1.5px solid #c2c0b6;border-radius:3px;flex-shrink:0;cursor:pointer;background:none;position:relative}
.tcb.dn{background:#b4b2a9;border-color:#b4b2a9}.tcb.dn::after{content:'✓';position:absolute;top:-1px;left:2px;font-size:10px;color:#fff}
.ttx{flex:1;font-size:13px}.ttx.dn{text-decoration:line-through;color:#b4b2a9}
.tdv{font-size:9px;padding:2px 6px;border-radius:3px;border:0.5px solid #e8e6df;color:#a09f99;background:#fafaf8;flex-shrink:0}
.ta{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500;flex-shrink:0}
.ttd{font-size:11px;color:#b4b2a9;flex-shrink:0}

.gph{display:flex;align-items:center;justify-content:center;height:100%;color:#b4b2a9;font-size:14px}
</style>
</head>
<body>
<div class="shell">
  <div class="sb">
    <div class="sb-top">
      <div class="sb-logo"><div class="sb-logo-c">R</div> Ryan's Todo</div>
      <div class="ts"><div class="ts-i">S</div><span class="ts-n">SCD팀</span><span class="ts-a">▾</span></div>
    </div>
    <div class="sb-scroll">
      <div class="sb-sec">글로벌 뷰</div>
      <div class="si" onclick="showG('오늘 할일')"><span class="si-icon">📋</span> 오늘 할일</div>
      <div class="si" onclick="showG('전체 할일')"><span class="si-icon">📑</span> 전체 할일</div>
      <div class="si" onclick="showG('매트릭스')"><span class="si-icon">⊞</span> 매트릭스</div>
      <div class="si" onclick="showG('타임라인')"><span class="si-icon">▤</span> 타임라인</div>
      <div class="si" onclick="showG('노트')"><span class="si-icon">✎</span> 노트</div>
      <div class="sb-div"></div>
      <div class="sb-sec">팀 프로젝트 <span class="sb-sec-add">+</span></div>
      <div class="si on" data-p="jt" onclick="showP('jt')"><span class="sd" style="background:#1D9E75"></span> 정기주총</div>
      <div class="si" data-p="abi" onclick="showP('abi')"><span class="sd" style="background:#D85A30"></span> ABI 코리아</div>
      <div class="si" data-p="jp" onclick="showP('jp')"><span class="sd" style="background:#378ADD"></span> 일본법인/해외SCM</div>
      <div class="si" data-p="bis" onclick="showP('bis')"><span class="sd" style="background:#EF9F27"></span> BIS</div>
      <div class="sb-div"></div>
      <div class="sb-sec">개인 프로젝트 <span class="sb-sec-add">+</span></div>
      <div class="si" data-p="etc" onclick="showP('etc')"><span class="sd" style="background:#97C459"></span> 개별과제</div>
      <div class="si" data-p="cp" onclick="showP('cp')"><span class="sd" style="background:#b4b2a9"></span> C&Plus</div>
    </div>
    <div class="sb-footer">
      <div class="sf">🔔 알림</div>
      <div class="sf">? 도움말</div>
      <div class="sb-div" style="margin:2px 0"></div>
      <div class="sp"><div class="sp-av">RP</div><div><div class="sp-n">Ryan Park</div><div class="sp-e">gunwoong.park@gmail.com</div></div></div>
    </div>
  </div>
  <div class="main">
    <div class="ph" id="ph">
      <div class="ph-d" style="background:#1D9E75"></div>
      <span class="ph-n">정기주총</span>
      <span class="ph-m">SCD팀</span>
      <div class="ph-tabs" id="ptabs"></div>
    </div>
    <div class="mmb" id="mbar" style="display:none"></div>
    <div class="cnt" id="cnt"></div>
  </div>
</div>
<script>
var A={Ryan:['#FAECE7','#993C1D'],Ethan:['#E6F1FB','#185FA5'],Ash:['#EAF3DE','#3B6D11'],Eric:['#EEEDFE','#534AB7'],Edmond:['#FAEEDA','#854F0B']};
function pill(n){if(!n)return '';return '<span class="ta" style="background:'+A[n][0]+';color:'+A[n][1]+'">'+n+'</span>'}
function pillSm(n){if(!n)return '';return '<span class="tk-who" style="background:'+A[n][0]+';color:'+A[n][1]+'">'+n+'</span>'}

var tab='ref',taskMode='list',paraMode='simple';
function sw(t){tab=t;Z()}
function setM(m){if(tab==='tasks')taskMode=m;if(tab==='para')paraMode=m;Z()}
function showP(id){document.querySelectorAll('.si').forEach(function(e){e.classList.remove('on')});var el=document.querySelector('[data-p="'+id+'"]');if(el)el.classList.add('on');tab='ref';Z()}
function showG(n){document.querySelectorAll('.si').forEach(function(e){e.classList.remove('on')});event.target.closest('.si').classList.add('on');document.getElementById('ph').style.display='none';document.getElementById('mbar').style.display='none';document.getElementById('cnt').innerHTML='<div class="gph">글로벌 '+n+' 뷰</div>'}
function Z(){
  document.getElementById('ph').style.display='flex';
  var tabs=[{id:'ref',l:'Reference'},{id:'tasks',l:'Tasks',b:'12'},{id:'para',l:'병렬 보기',bw:'미배정 3'}];
  document.getElementById('ptabs').innerHTML=tabs.map(function(t){return '<button class="pt'+(tab===t.id?' on':'')+'" onclick="sw(\''+t.id+'\')">'+t.l+(t.b?'<span class="bg">'+t.b+'</span>':'')+(t.bw?'<span class="bg bw">'+t.bw+'</span>':'')+'</button>'}).join('');
  var mb=document.getElementById('mbar');
  if(tab==='tasks'){mb.style.display='flex';mb.innerHTML=MBT('list','목록')+MBT('outliner','아웃라이너')+MBT('timeline','타임라인')}
  else if(tab==='para'){mb.style.display='flex';mb.innerHTML=MBT2('simple','타임라인')+MBT2('detail','결과물 + Task')}
  else mb.style.display='none';
  var c=document.getElementById('cnt');
  if(tab==='ref')c.innerHTML=vRef();
  else if(tab==='tasks')c.innerHTML=vTasks();
  else c.innerHTML='<div class="gph">병렬 보기 ('+paraMode+')</div>';
}
function MBT(k,l){return '<button class="mbt'+(taskMode===k?' on':'')+'" onclick="setM(\''+k+'\')">'+l+'</button>'}
function MBT2(k,l){return '<button class="mbt'+(paraMode===k?' on':'')+'" onclick="setM(\''+k+'\')">'+l+'</button>'}

var MS=[
{t:'소집통지 발송 완료',d:'주주 1% 이상 이메일 + 등기 기준',s:'2026.03.10',e:'2026.03.20',dd:'D-5',c:'#D85A30',u:1,
 dvs:[{n:1,t:'소집통지서 + 공고문',tag:'법무 검토',tbg:'#E6F1FB',ttc:'#185FA5',
       tasks:[{t:'소집통지 메일 발송',a:'Ethan'},{t:'1% 이상 주주 연락',a:'Ethan'}]}],
 directTasks:[{t:'주주분류 확인',a:'Ash',dn:1}]},

{t:'안건자료 확정',d:'이사회 승인 후 최종본',s:'2026.03.12',e:'2026.03.21',dd:'D-6',c:'#BA7517',u:1,
 dvs:[{n:1,t:'안건자료 PPT (주주 배포용)',tag:'Eric 승인',tbg:'#FAEEDA',ttc:'#854F0B',
       tasks:[{t:'안건 PPT 작성',a:'Ryan'}]}],
 directTasks:[]},

{t:'위임장 취합 마감',d:'현장 집계 포함',s:'2026.03.20',e:'2026.03.31',dd:'D-16',c:'#1D9E75',u:0,
 dvs:[],
 directTasks:[{t:'위임장 양식 확인',a:'Edmond'},{t:'위임장 발송',a:'Edmond'}]},

{t:'등기 서류 마감',d:'주총 관련 등기 일체',s:'2026.03.15',e:'2026.03.28',dd:'D-13',c:'#993C1D',u:0,
 dvs:[{n:1,t:'등기 서류 일체',tag:'',tbg:'',ttc:'',
       tasks:[{t:'등기 서류 목록 작성',a:'Eric'},{t:'인감증명서 확인',a:'Edmond'}]}],
 directTasks:[]},

{t:'정기주총 개최',d:'본사 대강당 · 오전 10시',s:'2026.04.20',e:'2026.05.10',dd:'D-51',c:'#D85A30',u:0,
 dvs:[
   {n:1,t:'현장 운영 매뉴얼',tag:'',tbg:'',ttc:'',
    tasks:[{t:'배치도 초안',a:'Ash'},{t:'스크립트 작성',a:'Ethan'},{t:'투표 Dashboard',a:'Eric'}]},
   {n:2,t:'의사록 + 등기 서류',tag:'',tbg:'',ttc:'',tasks:[]}
 ],
 directTasks:[{t:'의사록 양식 준비',a:'Ryan'}]},
];

/* ═══ Reference ═══ */
function vRef(){
var h='<div class="rv"><div class="rv-body">';

MS.forEach(function(m){
  var allTasks=[];
  m.dvs.forEach(function(d){d.tasks.forEach(function(t){allTasks.push({t:t.t,a:t.a,dn:t.dn||0,dv:d.t})})});
  m.directTasks.forEach(function(t){allTasks.push({t:t.t,a:t.a,dn:t.dn||0,dv:null})});

  h+='<div class="mr">';

  // ── LEFT: Milestone + Deliverables ──
  h+='<div class="mr-left">';
  h+='<div class="ms-head">';
  h+='<div class="ms-dot" style="background:'+m.c+'"></div>';
  h+='<div class="ms-info">';
  h+='<div class="ms-t">'+m.t+'</div>';
  h+='<div class="ms-desc">'+m.d+'</div>';
  h+='<div class="ms-dates">';
  h+='<span class="ms-dv'+(m.u?' urg':'')+'">'+m.s+'</span>';
  h+='<span class="ms-sep">→</span>';
  h+='<span class="ms-dv'+(m.u?' urg':'')+'">'+m.e+'</span>';
  h+='<span class="ms-dd'+(m.u?' urg':'')+'">'+m.dd+'</span>';
  h+='</div></div>';
  h+='<button class="del-btn" title="삭제">✕</button>';
  h+='</div>';

  // Deliverables (single-line items)
  h+='<div class="dv-area">';
  if(m.dvs.length){
    m.dvs.forEach(function(d){
      var tc=d.tasks.length;
      h+='<div class="dv-line">';
      h+='<span class="dv-num">'+d.n+'</span>';
      h+='<span class="dv-name">'+d.t+'</span>';
      if(d.tag) h+='<span class="dv-tag" style="background:'+d.tbg+';color:'+d.ttc+'">'+d.tag+'</span>';
      h+='<button class="del-btn" title="삭제">✕</button>';
      h+='</div>';
    });
  }
  h+='<div class="dv-add">+ 결과물 추가</div>';
  h+='</div>';
  h+='</div>';

  // ── RIGHT: Tasks ──
  h+='<div class="mr-right">';

  if(allTasks.length===0){
    h+='<div class="tk-empty">⚠ Task 없음</div>';
  } else {
    allTasks.forEach(function(t){
      h+='<div class="tk-row">';
      h+='<div class="tk-cb'+(t.dn?' dn':'')+'"></div>';
      h+='<input class="tk-text'+(t.dn?' dn':'')+'" value="'+t.t+'" />';
      if(t.dv) h+='<span class="tk-dvtag">'+t.dv.substring(0,10)+'</span>';
      h+=pillSm(t.a);
      h+='<button class="del-btn" title="삭제">✕</button>';
      h+='</div>';
    });
  }

  h+='<div class="tk-add">+ Task 추가</div>';
  h+='</div>';

  h+='</div>';
});

h+='<div style="padding:10px 20px;border-top:0.5px solid #eeedea"><div class="dv-add">+ 마일스톤 추가</div></div>';
h+='</div>';

// Footer
h+='<div class="rv-footer">';
h+=COL('lk','🔗 참조 문서','3',LI('2025 정기주총 운영 결과 보고서','전년도 참고용')+LI('상법/정관 주요 조항 요약','법무팀 정리본')+LI('주주명부 (2026.01 기준)','1% 이상 주주'));
h+=COL('po','✓ 합의된 정책','4',PO('외부 발송 문서는 법무 검토 필수','법무팀','#E6F1FB','#185FA5','소집통지·공고문·위임장')+PO('안건자료 디자인 변경은 Eric 승인 후','팀내','#EAF3DE','#3B6D11','임의 수정 금지')+PO('스테이징 배포 전 팀장 리뷰','팀내','#EAF3DE','#3B6D11','')+PO('주주 개인정보 외부 반출 금지','법무팀','#E6F1FB','#185FA5','BCC 사용'));
h+='</div></div>';
return h;
}
function COL(id,t,c,inner){return '<div class="ctog" onclick="togS(\''+id+'\')"><span class="arr" id="a-'+id+'">▸</span> '+t+' <span class="sc">'+c+'</span></div><div class="cbo" id="s-'+id+'"><div class="ci">'+inner+'</div></div>'}
function LI(t,d){return '<div class="li"><span class="li-ic">↗</span><div><div class="li-t">'+t+'</div><div class="li-d">'+d+'</div></div></div>'}
function PO(t,tg,bg,tc,d){return '<div class="poli"><div class="poli-t"><span class="poli-tag" style="background:'+bg+';color:'+tc+'">'+tg+'</span> '+t+'</div>'+(d?'<div class="poli-d">'+d+'</div>':'')+'</div>'}
function togS(id){var b=document.getElementById('s-'+id),a=document.getElementById('a-'+id);if(b.style.maxHeight&&b.style.maxHeight!=='0px'){b.style.maxHeight='0';a.classList.remove('open')}else{b.style.maxHeight=b.scrollHeight+'px';a.classList.add('open')}}

TG('📌 이번 주',5,[TR('공동행사약정서 초안','Ryan','3/15',0,''),TR('1% 이상 주주 연락','Ethan','3/16',0,'소집통지서'),TR('소집 공고 초안','Ash','3/17',0,''),TR('등기 서류 목록 작성','Eric','3/18',0,'등기 서류'),TR('위임장 양식 확인','Edmond','3/18',0,'')])+
TG('📅 다음 주',4,[TR('의사록 양식 준비','Ryan','3/24',0,''),TR('배치도 초안','Ash','3/25',0,'운영 매뉴얼'),TR('스크립트 작성','Ethan','3/26',0,'운영 매뉴얼'),TR('위임장 발송','Edmond','3/28',0,'')])+
'</div>';

function TG(t,c,r){return '<div class="tg"><div class="tg-h">'+t+' <span class="tg-c">'+c+'</span></div>'+r.join('')+'</div>'}
function TR(t,n,d,dn,dv){return '<div class="trow"><div class="tcb'+(dn?' dn':'')+'"></div><span class="ttx'+(dn?' dn':'')+'">'+t+'</span>'+(dv?'<span class="tdv">'+dv+'</span>':'')+pill(n)+'<span class="ttd">'+d+'</span></div>'}

Z();
