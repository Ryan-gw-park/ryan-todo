<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan's Todo — Loop-25 Mockup v8</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;background:#eceae4;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.shell{display:flex;width:1280px;height:820px;font-size:13px;color:#2C2C2A;background:#f7f6f3;border-radius:14px;overflow:hidden;border:0.5px solid #d3d1c7;box-shadow:0 4px 32px rgba(0,0,0,.10)}

/* Sidebar */
.sb{width:210px;background:#fff;border-right:0.5px solid #e8e6df;display:flex;flex-direction:column;flex-shrink:0;user-select:none}
.sb-top{padding:14px 14px 0;display:flex;flex-direction:column;gap:8px}
.sb-logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;letter-spacing:-.01em}
.sb-logo-c{width:28px;height:28px;border-radius:8px;background:#1D9E75;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.team-sel{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:7px;background:#f5f4f0;cursor:pointer;font-size:12px;color:#6b6a66;border:0.5px solid #e8e6df}
.team-sel:hover{background:#eeedea}
.team-sel-icon{width:20px;height:20px;border-radius:5px;background:#378ADD;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;flex-shrink:0}
.team-sel-name{font-weight:500;flex:1}
.team-sel-arrow{font-size:10px;color:#b4b2a9}
.sb-scroll{flex:1;overflow-y:auto;padding:4px 0}
.sb-sec{padding:12px 14px 4px;font-size:10px;color:#a09f99;font-weight:600;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.sb-sec-add{font-size:14px;color:#b4b2a9;cursor:pointer;font-weight:400;line-height:1}.sb-sec-add:hover{color:#6b6a66}
.sb-i{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;border-radius:7px;margin:1px 6px;font-size:13px;color:#6b6a66;transition:all .12s}
.sb-i:hover{background:#f5f4f0;color:#2C2C2A}
.sb-i.on{background:#f0efe8;color:#2C2C2A;font-weight:500}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-icon{width:16px;text-align:center;font-size:13px;flex-shrink:0;opacity:.6}
.sb-div{height:0.5px;background:#e8e6df;margin:6px 14px}
.sb-footer{border-top:0.5px solid #e8e6df;padding:8px 10px;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.sb-f-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:#a09f99}
.sb-f-item:hover{background:#f5f4f0;color:#6b6a66}
.sb-profile{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer}
.sb-profile:hover{background:#f5f4f0}
.sb-avatar{width:24px;height:24px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600;flex-shrink:0}
.sb-pname{font-size:12px;font-weight:500;color:#2C2C2A}
.sb-pemail{font-size:10px;color:#b4b2a9}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.phdr{display:flex;align-items:center;gap:10px;height:48px;padding:0 20px;background:#fff;border-bottom:0.5px solid #e8e6df;flex-shrink:0}
.phdr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phdr-name{font-size:15px;font-weight:600;letter-spacing:-.01em}
.phdr-meta{font-size:11px;color:#a09f99}
.phdr-tabs{margin-left:auto;display:flex;gap:2px}
.pt{font-size:12px;padding:5px 14px;border-radius:7px;cursor:pointer;color:#a09f99;background:none;border:none;font-family:inherit;font-weight:500}
.pt:hover{background:#f5f4f0;color:#6b6a66}
.pt.on{background:#f0efe8;color:#2C2C2A;font-weight:600}
.badge{font-size:10px;background:#e8e6df;border-radius:999px;padding:1px 7px;margin-left:4px;color:#a09f99;font-weight:500}
.badge-w{background:#FAEEDA;color:#854F0B}

/* Mode bar (Tasks + Parallel only) */
.mode-bar{display:flex;align-items:center;gap:1px;padding:6px 20px;background:#fafaf8;border-bottom:0.5px solid #e8e6df;flex-shrink:0}
.mb{font-size:11px;padding:4px 12px;border-radius:5px;cursor:pointer;color:#a09f99;background:none;border:none;font-family:inherit;font-weight:500}
.mb:hover{background:#f0efe8;color:#6b6a66}
.mb.on{background:#e8e6df;color:#2C2C2A;font-weight:600}

.cnt{flex:1;overflow:auto;background:#fff}

/* ── Reference ── */
.rv{display:flex;flex-direction:column;height:100%}
.rv-main{flex:1;overflow-y:auto}
.rv-footer{border-top:0.5px solid #e8e6df;flex-shrink:0;background:#fafaf8}
.rv-colhdr{display:flex;position:sticky;top:0;z-index:3;background:#fff;border-bottom:0.5px solid #e8e6df}
.rv-ch{flex:1;padding:8px 22px;font-size:11px;font-weight:600;color:#a09f99;letter-spacing:.03em}
.rv-ch+.rv-ch{border-left:0.5px solid #e8e6df}
.rv-row{display:flex;border-bottom:0.5px solid #eeedea;min-height:72px}
.rv-left{flex:1;padding:14px 22px;border-right:0.5px solid #eeedea}
.rv-right{flex:1;padding:10px 18px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.mh{display:flex;align-items:flex-start;gap:10px}
.mh-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.mh-info{flex:1}
.mh-t{font-size:14px;font-weight:600;letter-spacing:-.01em}
.mh-d{font-size:11px;color:#a09f99;margin-top:3px;line-height:1.4}
.mh-r{text-align:right;flex-shrink:0}
.mh-date{font-size:13px;font-weight:500}
.mh-date.urg{color:#BA7517;font-weight:600}
.mh-dd{font-size:10px;color:#b4b2a9;display:block;margin-top:1px}
.dv{padding:9px 12px;background:#fafaf8;border-radius:7px;border-left:3px solid transparent;transition:background .12s}
.dv:hover{background:#f0efe8}
.dv-r1{display:flex;align-items:center;gap:6px}
.dv-n{font-size:11px;color:#b4b2a9;font-weight:600}
.dv-t{font-size:13px;font-weight:500;flex:1}
.dv-w{font-size:11px;color:#6b6a66;flex-shrink:0}
.dv-r2{font-size:11px;color:#a09f99;margin-top:2px}
.dv-r3{display:flex;align-items:center;gap:8px;margin-top:5px}
.dv-tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.dv-tc{font-size:10px;display:inline-flex;align-items:center;gap:3px;margin-left:auto}
.dv-tc.ok{color:#0F6E56}.dv-tc.no{color:#BA7517}
.dv-add{font-size:11px;color:#b4b2a9;cursor:pointer;padding:4px 0;display:inline-flex;align-items:center;gap:3px}.dv-add:hover{color:#2C2C2A}
.rv-empty{font-size:11px;color:#b4b2a9;font-style:italic;display:flex;align-items:center;gap:6px}
.rv-empty-a{font-style:normal;color:#a09f99;cursor:pointer}.rv-empty-a:hover{color:#2C2C2A}
.ctog{display:flex;align-items:center;gap:7px;padding:10px 22px;cursor:pointer;font-size:12px;color:#a09f99;font-weight:500}
.ctog:hover{background:#f0efe8}
.ctog .arr{font-size:10px;transition:transform .2s;display:inline-block}
.ctog .arr.open{transform:rotate(90deg)}
.ctog .sc{font-size:10px;background:#eeedea;border-radius:999px;padding:0 6px;color:#b4b2a9}
.cbo{overflow:hidden;max-height:0;transition:max-height .25s ease}
.ci{padding:0 22px 14px 40px}
.li{display:flex;align-items:flex-start;gap:8px;padding:5px 0;cursor:pointer}
.li-ic{color:#378ADD;font-size:12px;margin-top:2px;flex-shrink:0}
.li-t{font-size:12px;color:#378ADD}.li-t:hover{text-decoration:underline}
.li-d{font-size:11px;color:#b4b2a9}
.poli{padding:5px 0}.poli-t{font-size:12px;line-height:1.5}
.poli-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:3px;margin-right:4px;font-weight:500}
.poli-d{font-size:11px;color:#a09f99;margin-top:1px}

/* ── Tasks ── */
.tbar{display:flex;align-items:center;gap:12px;padding:9px 22px;background:#fafaf8;border-bottom:0.5px solid #e8e6df;font-size:11px;color:#a09f99}
.tbar-ms{display:flex;align-items:center;gap:5px}
.tbar-dot{width:6px;height:6px;border-radius:50%;background:#BA7517}
.tbar-label{font-weight:600;color:#2C2C2A;font-size:12px}
.tbar-dd{color:#BA7517;font-weight:600}
.tbar-gap{background:#FAEEDA;color:#854F0B;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:500}
.tg{padding:16px 22px 6px}
.tg-h{font-size:12px;font-weight:600;color:#6b6a66;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tg-c{font-size:11px;color:#b4b2a9;font-weight:400}
.trow{display:flex;align-items:center;gap:8px;padding:7px 0}
.trow:hover{background:#fafaf8;margin:0 -22px;padding:7px 22px}
.tcb{width:16px;height:16px;border:1.5px solid #c2c0b6;border-radius:3px;flex-shrink:0;cursor:pointer;background:none;position:relative}
.tcb.dn{background:#b4b2a9;border-color:#b4b2a9}
.tcb.dn::after{content:'✓';position:absolute;top:-1px;left:2px;font-size:11px;color:#fff}
.ttx{flex:1;font-size:13px}.ttx.dn{text-decoration:line-through;color:#b4b2a9}
.tdv{font-size:9px;padding:2px 7px;border-radius:3px;flex-shrink:0;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:0.5px solid #e8e6df;color:#a09f99;background:#fafaf8}
.ta{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:500;flex-shrink:0}
.td{font-size:11px;color:#b4b2a9;flex-shrink:0;min-width:30px;text-align:right}

/* Outliner */
.ol{padding:12px 22px 20px}
.ol-i{border-bottom:0.5px solid #f0efe8;padding:8px 0}
.ol-h{display:flex;align-items:center;gap:8px;cursor:pointer}
.ol-tog{font-size:10px;color:#b4b2a9;width:14px;text-align:center;flex-shrink:0;transition:transform .15s}
.ol-tog.open{transform:rotate(90deg)}
.ol-cb{width:15px;height:15px;border:1.5px solid #c2c0b6;border-radius:3px;flex-shrink:0}
.ol-t{font-size:13px;font-weight:500;flex:1}
.ol-m{display:flex;align-items:center;gap:6px}
.ol-note{margin:6px 0 4px 36px;font-size:12px;color:#6b6a66;line-height:1.6;padding:8px 12px;background:#fafaf8;border-radius:6px;border-left:2px solid #e8e6df;display:none}
.ol-note.open{display:block}
.ol-note-ph{color:#b4b2a9;font-style:italic}

/* Gantt shared */
.gt{width:100%;border-collapse:collapse;table-layout:fixed}
.gt th{font-size:10px;font-weight:500;color:#b4b2a9;text-align:center;padding:8px 0;border-bottom:0.5px solid #e8e6df;position:sticky;top:0;background:#fff;z-index:2}
.gt th.tc{color:#378ADD;background:rgba(55,138,221,.04)}
.gt td{padding:0;border-bottom:0.5px solid #f0efe8;vertical-align:middle}
.gt td:first-child{padding:8px 12px;font-size:12px;white-space:nowrap;border-right:0.5px solid #e8e6df;width:210px}
.gl{display:flex;align-items:center;gap:6px}
.gl-n{color:#b4b2a9;font-weight:600;min-width:20px;font-size:11px}
.gl-t{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis}
.gl-d{font-size:10px;color:#b4b2a9;margin-left:auto;flex-shrink:0}
.bc{position:relative;height:38px}
.gb{position:absolute;height:12px;top:13px;border-radius:3px;opacity:.85}
.ubadge{font-size:9px;background:#FAEEDA;color:#854F0B;padding:0 5px;border-radius:2px;font-weight:600;margin-left:5px}
.tln{position:absolute;top:0;bottom:0;width:1.5px;background:#378ADD;z-index:1;opacity:.45}

/* ── Parallel: Simple (gantt only) ── */
/* ── Parallel: Detail (gantt + tasks) ── */
.pw{display:flex;flex-direction:column;height:100%}
.pwh{display:flex;position:sticky;top:0;z-index:3;background:#fff;border-bottom:0.5px solid #e8e6df}
.pwhl{padding:7px 12px;font-size:10px;color:#a09f99;font-weight:600;letter-spacing:.03em;flex-shrink:0}
.pwcols{display:flex;flex:1}
.pwcol{flex:1;text-align:center;font-size:10px;padding:7px 0;color:#b4b2a9;font-weight:500}
.pwcol.today{color:#378ADD;background:rgba(55,138,221,.04)}
.pwht{padding:7px 12px;font-size:10px;color:#a09f99;font-weight:600;letter-spacing:.03em;flex-shrink:0}
.pwb{flex:1;overflow-y:auto}
.pwms{background:#fafaf8;border-bottom:0.5px solid #e8e6df;display:flex}
.pwmsl{display:flex;align-items:center;gap:7px;padding:6px 12px;font-size:11px;font-weight:600;color:#6b6a66;flex:1}
.pwmsd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pwmsr{flex-shrink:0;border-left:0.5px solid #e8e6df}
.pwr{display:flex;border-bottom:0.5px solid #f0efe8;min-height:46px}
.pwrl{width:160px;flex-shrink:0;padding:7px 10px 7px 26px;border-right:0.5px solid #e8e6df;display:flex;align-items:center}
.pwrt{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pwrg{flex:1;position:relative;min-height:38px;border-right:0.5px solid #e8e6df}
.pwrk{flex-shrink:0;padding:5px 12px;display:flex;flex-direction:column;justify-content:center;gap:3px}
.pwrk.empty{background:repeating-linear-gradient(135deg,transparent,transparent 10px,rgba(186,117,23,.025) 10px,rgba(186,117,23,.025) 20px)}
.pwtt{display:flex;align-items:center;gap:5px;font-size:11px}
.pwtcb{width:11px;height:11px;border:1.5px solid #c2c0b6;border-radius:2px;flex-shrink:0}
.pwtn{flex:1}
.pwta{font-size:10px;padding:1px 6px;border-radius:999px;font-weight:500;flex-shrink:0}
.pwe{display:flex;align-items:center;gap:5px;font-size:11px;color:#BA7517;font-weight:500}
.pwab{font-size:10px;color:#a09f99;background:none;border:0.5px solid #d3d1c7;border-radius:3px;padding:2px 8px;cursor:pointer;font-family:inherit;margin-left:2px}.pwab:hover{background:#f5f4f0}

.gph{display:flex;align-items:center;justify-content:center;height:100%;color:#b4b2a9;font-size:14px}
</style>
</head>
<body>
<div class="shell">
  <div class="sb">
    <div class="sb-top">
      <div class="sb-logo"><div class="sb-logo-c">R</div> Ryan's Todo</div>
      <div class="team-sel"><div class="team-sel-icon">S</div><span class="team-sel-name">SCD팀</span><span class="team-sel-arrow">▾</span></div>
    </div>
    <div class="sb-scroll">
      <div class="sb-sec">글로벌 뷰</div>
      <div class="sb-i" onclick="showG('오늘할일')"><span class="sb-icon">📋</span> 오늘할일</div>
      <div class="sb-i" onclick="showG('매트릭스')"><span class="sb-icon">⊞</span> 매트릭스</div>
      <div class="sb-i" onclick="showG('타임라인')"><span class="sb-icon">▤</span> 타임라인</div>
      <div class="sb-i" onclick="showG('노트')"><span class="sb-icon">✎</span> 노트</div>
      <div class="sb-div"></div>
      <div class="sb-sec">팀 프로젝트 <span class="sb-sec-add">+</span></div>
      <div class="sb-i on" data-p="jt" onclick="showP('jt')"><span class="sb-dot" style="background:#1D9E75"></span> 정기주총</div>
      <div class="sb-i" data-p="abi" onclick="showP('abi')"><span class="sb-dot" style="background:#D85A30"></span> ABI 코리아</div>
      <div class="sb-i" data-p="jp" onclick="showP('jp')"><span class="sb-dot" style="background:#378ADD"></span> 일본법인/해외SCM</div>
      <div class="sb-i" data-p="bis" onclick="showP('bis')"><span class="sb-dot" style="background:#EF9F27"></span> BIS</div>
      <div class="sb-div"></div>
      <div class="sb-sec">개인 프로젝트 <span class="sb-sec-add">+</span></div>
      <div class="sb-i" data-p="etc" onclick="showP('etc')"><span class="sb-dot" style="background:#97C459"></span> 개별과제</div>
      <div class="sb-i" data-p="study" onclick="showP('study')"><span class="sb-dot" style="background:#b4b2a9"></span> 자기개발</div>
    </div>
    <div class="sb-footer">
      <div class="sb-f-item"><span style="font-size:12px">?</span> 도움말</div>
      <div class="sb-div" style="margin:2px 0"></div>
      <div class="sb-profile"><div class="sb-avatar">RP</div><div><div class="sb-pname">Ryan Park</div><div class="sb-pemail">ryan@company.com</div></div></div>
    </div>
  </div>
  <div class="main">
    <div class="phdr" id="phdr">
      <div class="phdr-dot" style="background:#1D9E75"></div>
      <span class="phdr-name">정기주총</span>
      <span class="phdr-meta">2026.03 ~ 2026.05 · SCD팀</span>
      <div class="phdr-tabs" id="ptabs"></div>
    </div>
    <div class="mode-bar" id="mbar" style="display:none"></div>
    <div class="cnt" id="cnt"></div>
  </div>
</div>
<script>
var A={Ryan:['#FAECE7','#993C1D'],Ethan:['#E6F1FB','#185FA5'],Ash:['#EAF3DE','#3B6D11'],Eric:['#EEEDFE','#534AB7'],Edmond:['#FAEEDA','#854F0B']};
function pill(n){return '<span class="ta" style="background:'+A[n][0]+';color:'+A[n][1]+'">'+n+'</span>'}
function pillS(n){return '<span class="pwta" style="background:'+A[n][0]+';color:'+A[n][1]+'">'+n+'</span>'}

var tab='ref',taskMode='list',paraMode='simple';

function sw(t){tab=t;Z()}
function Z(){
  document.getElementById('phdr').style.display='flex';
  var tabs=[{id:'ref',l:'Reference'},{id:'tasks',l:'Tasks',b:'12'},{id:'para',l:'병렬 보기',bw:'미배정 4'}];
  document.getElementById('ptabs').innerHTML=tabs.map(function(t){
    var c='pt'+(tab===t.id?' on':'');
    var bh=t.b?'<span class="badge">'+t.b+'</span>':'';
    if(t.bw)bh='<span class="badge badge-w">'+t.bw+'</span>';
    return '<button class="'+c+'" onclick="sw(\''+t.id+'\')">'+t.l+bh+'</button>';
  }).join('');

  var mb=document.getElementById('mbar');
  if(tab==='tasks'){
    mb.style.display='flex';
    mb.innerHTML=MBT('list','목록',taskMode)+MBT('outliner','아웃라이너',taskMode)+MBT('timeline','타임라인',taskMode);
  } else if(tab==='para'){
    mb.style.display='flex';
    mb.innerHTML=MBT('simple','타임라인',paraMode)+MBT('detail','결과물 + Task',paraMode);
  } else {
    mb.style.display='none';
  }

  var c=document.getElementById('cnt');
  if(tab==='ref') c.innerHTML=vRef();
  else if(tab==='tasks') c.innerHTML=taskMode==='list'?vTaskList():taskMode==='outliner'?vTaskOL():vTaskTL();
  else c.innerHTML=paraMode==='simple'?vParaSimple():vParaDetail();
}
function MBT(id,l,cur){return '<button class="mb'+(cur===id?' on':'')+'" onclick="setMode(\''+id+'\')">'+l+'</button>'}
function setMode(m){if(tab==='tasks')taskMode=m;else if(tab==='para')paraMode=m;Z()}
function showP(id){document.querySelectorAll('.sb-i').forEach(function(e){e.classList.remove('on')});var el=document.querySelector('[data-p="'+id+'"]');if(el)el.classList.add('on');tab='ref';Z()}
function showG(n){document.querySelectorAll('.sb-i').forEach(function(e){e.classList.remove('on')});event.target.closest('.sb-i').classList.add('on');document.getElementById('phdr').style.display='none';document.getElementById('mbar').style.display='none';document.getElementById('cnt').innerHTML='<div class="gph">글로벌 '+n+' 뷰</div>'}

/* ═══ DATA ═══ */
